name: Murmur CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        xcode: ['15.3', '15.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            murmur/.build
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ matrix.xcode }}-${{ hashFiles('murmur/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.xcode }}-
      - name: Swift Version
        run: swift --version
      - name: Build (Release)
        working-directory: murmur
        run: swift build -c release
      - name: Package .app
        working-directory: murmur
        run: |
          APP_DIR="MurmurApp.app"
          BIN_PATH=".build/release/MurmurApp"
          rm -rf "${APP_DIR}"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          cp "${BIN_PATH}" "${APP_DIR}/Contents/MacOS/MurmurApp"
          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.uprootiny.murmur</string>
            <key>CFBundleName</key>
            <string>Murmur</string>
            <key>CFBundleExecutable</key>
            <string>MurmurApp</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --sign - "${APP_DIR}" || true
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "MurmurApp-macos-${{ matrix.xcode }}.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MurmurApp-macos-${{ matrix.xcode }}
          path: murmur/MurmurApp-macos-${{ matrix.xcode }}.zip

  lint:
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        xcode: ['15.3', '15.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            murmur/.build
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ matrix.xcode }}-${{ hashFiles('murmur/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.xcode }}-
      - name: Lint (warnings as errors)
        working-directory: murmur
        run: swift build -Xswiftc -warnings-as-errors

  test:
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        xcode: ['15.3', '15.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            murmur/.build
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ matrix.xcode }}-${{ hashFiles('murmur/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.xcode }}-
      - name: Test
        working-directory: murmur
        run: swift test

  legacy-build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Build (Legacy)
        working-directory: murmur
        run: swift build -c release -Xswiftc -DMURMUR_LEGACY

  validate:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Build + Test
        working-directory: murmur
        run: |
          swift build -c release
          swift test
